services:
  backend:
    build: ./backend/Api
    volumes:
      - ./backend/Api:/app 
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app 
      - /app/node_modules 
    ports:
      - "4200:4000"