<div class="auth-container">
  <div class="auth-card">
    <h2>{{ isVerifying ? 'Confirm your Email' : 'Create New Account' }}</h2>
    <p>{{ isVerifying ? 'Enter the 6-digit code sent to your inbox' : 'Join the D-Infinity world' }}</p>

    @if (!isVerifying) {
      <form [formGroup]="userForm" (ngSubmit)="onSendCode()">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" formControlName="name" placeholder="Enter your name">
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" formControlName="email" placeholder="email@example.com">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" formControlName="password" placeholder="At least 3 characters">
        </div>

        <button type="submit" [disabled]="userForm.invalid || isLoading">
          {{ isLoading ? 'Sending...' : 'Send Verification Code' }}
        </button>

        <div class="footer-link">
          Already have an account? <a routerLink="/login">Login here</a>
        </div>
      </form>

    } @else {
      <div class="verification-section">
        <div class="form-group">
          <label>6-Digit Code (Sent to {{ userForm.value.email }})</label>
          <input 
            type="text" 
            [(ngModel)]="verificationCode" 
            maxlength="6" 
            placeholder="000000" 
            class="code-input"
            style="text-align: center; font-size: 24px; letter-spacing: 8px;"
          >
        </div>

        <button (click)="onVerifyAndRegister()" [disabled]="verificationCode.length < 6 || isLoading">
          {{ isLoading ? 'Verifying...' : 'Finalize Registration' }}
        </button>
        
        <button class="btn-secondary" (click)="isVerifying = false" [disabled]="isLoading">
          Back to Edit Info
        </button>
      </div>
    }

  </div>
</div>
