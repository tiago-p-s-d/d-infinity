<div class="auth-container">
  <div class="auth-card">
    <h2>Create New Account</h2>
    <p>Join the D-Infinity world</p>

    <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" formControlName="nome" placeholder="Enter your name">
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" formControlName="email" placeholder="email@example.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="senha" placeholder="At least 3 characters">
      </div>

      <button type="submit" [disabled]="userForm.invalid">Register</button>

      <div class="footer-link">
        Already have an account? <a routerLink="/login">Login here</a>
      </div>
    </form>
  </div>
</div>
