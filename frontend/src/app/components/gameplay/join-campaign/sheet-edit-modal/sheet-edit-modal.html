@if (open && sheet) {
  <div class="modal-backdrop" (click)="onBackdropClick($event)">
    <div class="modal-box">

      <div class="modal-header">
        <h3>Edit Character Sheet</h3>
        <button class="modal-close" (click)="closed.emit()">&#x2715;</button>
      </div>

      <div class="modal-body">
        <form [formGroup]="sheetForm" (ngSubmit)="onSave()">
          <div class="sheet-grid">
            @for (field of definitions; track field.name) {

              @if (field.type === 'textarea') {
                <div class="full-field">
                  <label>{{ field.name }}</label>
                  <textarea [formControlName]="field.name"
                            [placeholder]="field.placeholder ?? ''"></textarea>
                </div>
              } @else if (field.type === 'select') {
                <div class="field">
                  <label>{{ field.name }}</label>
                  <select [formControlName]="field.name">
                    <option [ngValue]="null" disabled>Select...</option>
                    @for (opt of field.options; track opt) {
                      <option [value]="opt">{{ opt }}</option>
                    }
                  </select>
                </div>
              } @else {
                <div class="field">
                  <label>{{ field.name }}</label>
                  <input [type]="getFieldType(field.type)"
                         [formControlName]="field.name"
                         [placeholder]="field.placeholder ?? field.name">
                </div>
              }

            }
          </div>

          <div class="modal-footer">
            <button type="button" class="btn-secondary" (click)="closed.emit()">Cancel</button>
            <button type="submit" class="btn-save" [disabled]="loading()">
              {{ loading() ? 'Saving...' : 'Save Changes' }}
            </button>
          </div>
        </form>
      </div>

    </div>
  </div>
}
